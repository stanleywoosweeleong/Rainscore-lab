<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f2a37">
<title>RainScore Lab · 雨准实验</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RainScore Lab">
<style>
:root{
  --bg:#0f1620; --panel:#172230; --panel2:#1f2d3d; --ink:#e8eef5; --ink2:#9fb1c6;
  --line:#2b3a4d; --rain:#4aa8d8; --bm:#5dd0c0; --ec:#e3a857; --win:#7bd88f;
  --m1:#5dd0c0; --m2:#e3a857; --m3:#b48ee8; --m4:#6db3f0; --m5:#f08fb0; --m6:#9ad36b;
  --bad:#e2715f; --warn:#e3b341; --shadow:rgba(0,0,0,.35);
  --pad:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Segoe UI",system-ui,-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;
  font-size:16px;line-height:1.5}
body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 8px)}
.wrap{max-width:760px;margin:0 auto;padding:0 var(--pad)}
header{display:flex;align-items:center;gap:10px;padding:14px var(--pad) 12px;
  position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 70%,transparent);z-index:20}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:.3px;min-width:0}
.logo .drop{font-size:24px;line-height:1;flex-shrink:0}
.brand-text{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.logo .name{font-size:17px;white-space:nowrap}
.logo .sub{font-size:11px;color:var(--ink2);font-weight:500;letter-spacing:.2px;white-space:nowrap}
.spacer{flex:1}
.lang{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
.lang:active{transform:scale(.96)}
/* blended secondary header buttons — transparent, muted, no competing fill */
.ghost-lang{background:transparent;border:none;color:var(--ink2);font-weight:600;font-size:16px}
.ghost-lang:hover{color:var(--ink)}
.ghost-icon{background:transparent;border:none;color:var(--ink2);border-radius:999px;
  width:34px;height:34px;font-size:19px;line-height:1;cursor:pointer;padding:0;
  display:flex;align-items:center;justify-content:center;transition:color .12s,background .12s}
.ghost-icon:hover{color:var(--ink);background:rgba(255,255,255,.05)}
.ghost-icon:active{transform:scale(.92)}
.add-btn{background:var(--rain);border:none;color:#06121b;border-radius:999px;
  width:34px;height:34px;font-size:21px;font-weight:700;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0}
.add-btn:active{transform:scale(.92)}
.add-btn.on{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.form-panel{margin-top:12px;padding-top:14px;border-top:1px solid var(--line)}
.form-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.form-head span{font-size:15px;font-weight:700}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:16px;margin:12px 0;box-shadow:0 1px 0 var(--shadow)}
.card h2{margin:0 0 4px;font-size:14px;letter-spacing:.4px;color:var(--ink2);
  text-transform:uppercase;font-weight:600}
label.fld{display:block;font-size:13px;color:var(--ink2);margin:10px 0 4px}
input,select{width:100%;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:9px;padding:11px 12px;font-size:15px;font-family:inherit}
input:focus,select:focus{outline:2px solid var(--rain);outline-offset:0}
.row{display:flex;gap:10px}
.row>*{flex:1}
.btn{display:block;width:100%;border:none;border-radius:10px;padding:13px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--rain);color:#06121b}
.btn-ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn-mini{padding:7px 12px;font-size:13px;border-radius:8px;width:auto;margin:0}
.loc-filter{width:100%;box-sizing:border-box;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:9px;padding:9px 12px;font-size:14px;font-family:inherit;margin-bottom:10px}
.loc-filter:focus{outline:2px solid var(--rain);outline-offset:0}
.loc-list{display:flex;flex-direction:column;gap:8px}
/* region accordion */
.loc-group-h{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;
  background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;
  font-family:inherit;flex-wrap:wrap}
.loc-group-h:active{transform:scale(.995)}
.loc-group-h.has-active{border-color:var(--rain)}
.lg-caret{color:var(--ink2);font-size:12px;width:12px;flex-shrink:0}
.lg-name{font-size:14px;font-weight:600;color:var(--ink);flex-shrink:0}
.lg-active{flex:1;min-width:0;font-size:12.5px;color:var(--rain);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding-left:8px;border-left:1px solid var(--line)}
.lg-count{font-size:12px;font-weight:700;color:var(--ink2);background:var(--panel);
  border-radius:999px;padding:1px 9px;min-width:20px;text-align:center;margin-left:auto;flex-shrink:0}
/* when a refresh button is present it takes the auto-margin; count sits snug after it */
.loc-group-h .lg-refresh{margin-left:auto}
.loc-group-h .lg-refresh ~ .lg-count{margin-left:8px}
.lg-refresh{background:var(--panel);border:1px solid var(--line);color:var(--rain);
  font-size:13px;font-weight:700;min-width:30px;height:25px;padding:0 8px;border-radius:999px;
  cursor:pointer;flex-shrink:0;line-height:1;font-family:inherit}
.lg-refresh:active{transform:scale(.94)}
.lg-refresh.spinning{opacity:.85}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
  background:var(--panel2);color:var(--ink);border:1px solid var(--line);padding:11px 18px;
  border-radius:10px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;
  z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:80vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.loc-group-h.open .lg-name{color:var(--rain)}
.loc-group-body{display:flex;flex-direction:column;gap:8px;margin:2px 0 4px 10px;
  padding-left:8px;border-left:2px solid var(--line)}
.loc{display:flex;align-items:center;gap:10px;background:var(--panel2);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer}
.loc.active{border-color:var(--rain);box-shadow:inset 0 0 0 1px var(--rain)}
.loc .nm{font-weight:600;font-size:15px}
.loc .co{font-size:12px;color:var(--ink2)}
.loc .gap{margin-left:auto;font-size:11px;color:var(--warn)}
.loc-actions{display:flex;gap:6px;margin-left:auto}
.icon-btn{background:var(--panel);border:1px solid var(--line);color:var(--ink2);
  border-radius:8px;padding:6px 9px;font-size:13px;cursor:pointer;font-family:inherit;line-height:1}
.icon-btn:active{transform:scale(.92)}
.icon-btn.del:hover{color:var(--bad);border-color:var(--bad)}
.loc.deleted{opacity:.5}
.loc.deleted .nm{text-decoration:line-through}
.bin{margin-top:12px}
.bin summary{color:var(--ink2);font-size:13px}
.bin .loc{margin-top:8px}
.purge-btn{background:rgba(226,113,95,.1);border:1px solid rgba(226,113,95,.35);
  color:var(--bad);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;margin-top:8px;width:auto}
.toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);
  transform:translateX(-50%) translateY(20px);background:var(--panel2);
  border:1px solid var(--line);color:var(--ink);padding:11px 16px;border-radius:10px;
  font-size:13.5px;box-shadow:0 6px 24px var(--shadow);opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:50;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast u{cursor:pointer;color:var(--rain);font-weight:700;margin-left:8px}
.muted{color:var(--ink2);font-size:13px}
.tiny{font-size:11.5px;color:var(--ink2)}

/* verdict */
.verdict{background:linear-gradient(135deg,#192634,#15202c);
  border:1px solid var(--line);border-radius:16px;padding:18px 16px;margin:12px 0}
.verdict .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.verdict .head .loc-nm{font-size:17px;font-weight:700}
.verdict .head .span{font-size:12px;color:var(--ink2)}
.vs{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:10px}
/* research build: flexible grid, up to 3 per row, wraps for 4-6 models */
.vs3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.basetag{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--rain);
  margin-top:2px;font-weight:600;min-height:13px}
.baseline-rec{margin-top:12px;padding:10px 12px;border-radius:10px;
  background:rgba(74,168,216,.1);border:1px solid rgba(74,168,216,.35);
  font-size:13.5px;line-height:1.5;color:#bfe1f3}
.baseline-rec b{font-weight:700}
.m-slot1{color:var(--m1)} .m-slot2{color:var(--m2)} .m-slot3{color:var(--m3)}
.m-slot4{color:var(--m4)} .m-slot5{color:var(--m5)} .m-slot6{color:var(--m6)}
.verdict .line b[class^="m-slot"], .baseline-rec b[class^="m-slot"]{font-weight:700}
.verdict .line b.m-slot1,.baseline-rec b.m-slot1{color:var(--m1)}
.verdict .line b.m-slot2,.baseline-rec b.m-slot2{color:var(--m2)}
.verdict .line b.m-slot3,.baseline-rec b.m-slot3{color:var(--m3)}
.verdict .line b.m-slot4,.baseline-rec b.m-slot4{color:var(--m4)}
.verdict .line b.m-slot5,.baseline-rec b.m-slot5{color:var(--m5)}
.verdict .line b.m-slot6,.baseline-rec b.m-slot6{color:var(--m6)}
.mcol{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:12px 6px;text-align:center;position:relative}
.mcol.winner{border-color:var(--win);box-shadow:0 0 0 1px var(--win)}
.mcol .mname{font-size:12.5px;font-weight:700;letter-spacing:.2px}
.vs3 .mcol .mname{font-size:12px}
.mcol .metric{margin-top:9px}
.mcol .mlabel{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink2)}
.rankb{display:inline-block;font-size:9px;font-weight:800;letter-spacing:0;
  background:var(--line);color:var(--ink);border-radius:5px;padding:1px 4px;margin-left:3px;
  vertical-align:middle}
.rankb.r1{background:var(--win);color:#06121b}
/* confidence pill in verdict header */
.conf{display:inline-block;font-size:10px;font-weight:700;border-radius:5px;
  padding:1px 6px;margin-left:6px;vertical-align:middle}
.conf-low{background:rgba(227,168,87,.18);color:#e3a857}
.conf-mid{background:rgba(74,168,216,.18);color:#6db3f0}
.conf-high{background:rgba(123,216,143,.18);color:#7bd88f}
/* sub-metrics under each value */
.subm{margin-top:3px;font-size:10px;line-height:1.3}
.bias.wet{color:#6db3f0} .bias.dry{color:#e3a857} .bias.zero{color:var(--ink2)}
.errsplit{display:flex;flex-direction:column;gap:1px;align-items:center}
.errsplit .miss{color:#f08fb0} .errsplit .fa{color:var(--ink2)}
/* charts */
.charts-card{margin-top:14px}
.charts-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.chart-warn{font-size:11.5px;color:#e3a857;background:rgba(227,168,87,.12);
  border-radius:8px;padding:7px 10px;margin:6px 0 10px}
.chart-block{margin-top:16px}
.chart-h{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:2px}
.chart-sub{font-size:10.5px;color:var(--ink2);margin-bottom:8px;line-height:1.4}
.chartsvg{width:100%;height:auto;max-width:360px;display:block}
.scatter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.scatter-cell{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px 4px 2px;text-align:center}
.scatter-name{font-size:10.5px;font-weight:700;margin-bottom:2px}
.scattersvg{width:100%;height:auto;display:block}
.chart-scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.timesvg{height:auto;display:block}
@media(max-width:420px){ .scatter-grid{grid-template-columns:repeat(2,1fr)} }
.mcol .mval{font-size:22px;font-weight:800;line-height:1.1;margin-top:1px;
  font-variant-numeric:tabular-nums}
.vs3 .mcol .mval{font-size:19px}
.mcol .munit{font-size:10.5px;color:var(--ink2)}
.mcol .crown{position:absolute;top:-11px;left:50%;transform:translateX(-50%);
  background:var(--win);color:#06121b;font-size:10px;font-weight:800;
  padding:2px 8px;border-radius:999px;letter-spacing:.4px}
.vmid{display:flex;align-items:center;justify-content:center;color:var(--ink2);
  font-size:13px;font-weight:700}
.verdict .line{margin-top:14px;padding-top:13px;border-top:1px solid var(--line);
  font-size:14.5px;line-height:1.45}
.verdict .line b.bm{color:var(--bm)} .verdict .line b.ec{color:var(--ec)}
.dualnote{margin-top:10px;font-size:12px;color:var(--ink2);line-height:1.5}
.share-btn{display:block;width:100%;margin-top:14px;border:none;border-radius:10px;
  padding:12px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;
  background:#1faa5a;color:#fff}
.share-btn:active{transform:scale(.985)}
/* models selector bar in the DATA card */
.models-bar{display:flex;align-items:center;gap:10px;width:100%;margin-top:10px;
  background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left}
.models-bar:active{transform:scale(.995)}
.models-bar-label{font-size:12px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.models-bar-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.mchip{font-size:12px;font-weight:700;border:1.5px solid;border-radius:999px;padding:2px 9px}
.models-bar-edit{color:var(--ink2);font-size:15px;flex-shrink:0}
/* picker list */
.mp-list{display:flex;flex-direction:column;gap:8px;margin:4px 0 10px}
.mp-item{display:flex;align-items:center;gap:11px;width:100%;background:var(--panel2);
  border:1px solid var(--line);border-radius:10px;padding:13px 14px;cursor:pointer;
  font-family:inherit;font-size:15px;color:var(--ink);text-align:left}
.mp-item.on{border-color:var(--rain);background:rgba(74,168,216,.1)}
.mp-item:active{transform:scale(.99)}
.mp-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#06121b;
  background:transparent;flex-shrink:0}
.mp-item.on .mp-check{background:var(--rain);border-color:var(--rain)}
.mp-name{flex:1;font-weight:600}
.mp-order{width:22px;height:22px;border-radius:999px;background:var(--rain);color:#06121b;
  font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mp-note{font-size:12.5px;color:var(--ink2);text-align:center;margin-bottom:4px;min-height:18px}
.mp-note.warn{color:#e3a857}
.modal-ov{position:fixed;inset:0;background:rgba(6,12,20,.72);z-index:60;
  display:flex;align-items:flex-end;justify-content:center;padding:0;
  animation:fadeIn .18s ease}
@media(min-width:560px){ .modal-ov{align-items:center;padding:20px} }
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel);border:1px solid var(--line);
  border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:16px;
  box-shadow:0 -8px 40px var(--shadow);max-height:88vh;overflow:auto;
  animation:slideUp .22s ease}
@media(min-width:560px){ .modal{border-radius:16px} }
@keyframes slideUp{from{transform:translateY(24px)}to{transform:translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  font-size:16px;font-weight:700;margin-bottom:6px}
.modal-hint{font-size:13px;color:var(--ink2);margin-bottom:10px;line-height:1.5}
.modal-ta{width:100%;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:10px;padding:12px;font-size:14px;line-height:1.55;
  font-family:inherit;resize:vertical;min-height:200px;white-space:pre-wrap}
.modal-ta:focus{outline:2px solid var(--rain);outline-offset:0}
.modal-actions{display:flex;gap:10px;margin-top:12px}
.modal-actions .btn{flex:1;margin-top:0}
.guide-body{margin-top:4px}
.qr-wrap{text-align:center;margin:4px 0 18px}
.qr{width:200px;height:200px;border-radius:12px;background:#fff;padding:10px;box-sizing:border-box}
.qr-cap{font-size:12.5px;color:var(--ink2);margin-top:8px}
.guide-sec{margin-bottom:14px}
.guide-h{font-size:14.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
.guide-p{font-size:13.5px;color:var(--ink2);line-height:1.6}
.guide-links{display:flex;flex-direction:column;gap:8px;margin:16px 0 12px}
.guide-link{display:block;text-align:center;text-decoration:none;background:var(--panel2);
  border:1px solid var(--line);color:var(--rain);border-radius:10px;padding:11px;
  font-size:14px;font-weight:600}
.guide-link:active{transform:scale(.99)}
.guide-foot{font-size:11.5px;color:var(--ink2);line-height:1.6;text-align:left;
  border-top:1px solid var(--line);padding-top:12px;margin-top:4px}

/* table */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px}
table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
th,td{padding:7px 8px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--panel)}
thead th{color:var(--ink2);font-weight:600;font-size:11.5px;text-transform:uppercase;
  letter-spacing:.3px;border-bottom:1px solid var(--line)}
tbody tr:last-child td{border-bottom:none}
td.bm{color:var(--bm)} td.ec{color:var(--ec)} td.act{color:var(--rain);font-weight:600}
td.pending{color:var(--ink2);font-style:italic}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:4px}
.dot.hit{background:var(--win)} .dot.miss{background:var(--bad)}
tfoot td{font-weight:700;border-top:2px solid var(--line);border-bottom:none;padding-top:9px}
tfoot td.label{color:var(--ink2);font-weight:600;text-transform:uppercase;font-size:11px}

.banner{border-radius:10px;padding:10px 12px;font-size:13px;margin:10px 0;line-height:1.5}
.banner.warn{background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.4);color:#f0d488}
.banner.info{background:rgba(74,168,216,.1);border:1px solid rgba(74,168,216,.35);color:#a9d6ee}
.banner.bad{background:rgba(226,113,95,.12);border:1px solid rgba(226,113,95,.4);color:#f0a99b}
.status{font-size:12px;color:var(--ink2);margin-top:8px;min-height:16px}
.empty{text-align:center;color:var(--ink2);padding:26px 10px;font-size:14px}
.empty .big{font-size:30px;margin-bottom:8px}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);
  border-radius:9px;padding:3px;gap:3px;margin-top:6px}
.seg button{flex:1;border:none;background:transparent;color:var(--ink2);
  padding:9px 7px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:background .12s,color .12s;letter-spacing:.3px}
.seg button:not(.on):hover{color:var(--ink);background:rgba(255,255,255,.04)}

   Conventions: single-file PWA, localStorage, Asia/Kuching, no fabricated data.
   Forecast source: Previous Runs API (precipitation_previous_day1 = what was
   forecast 24h before the day). Actual source: ERA5 archive precipitation_sum. */

const TZ = "Asia/Kuching";
const STORE_KEY = "rainscore_lab_v1";
const CACHE_TAG = "rainscore-lab-20260627-23";
const DRY_THRESHOLD = 1.0;   // mm — <1mm counts as a "dry day" (field-adjustable)
const PREV_HOST = "https://previous-runs-api.open-meteo.com/v1/forecast";
const ARCH_HOST = "https://archive-api.open-meteo.com/v1/archive";

/* The full pool of models the user can choose from. Each entry: `key` (stored
   data key, never reused), `api` (Open-Meteo model id), `cssVar` (display colour),
   `short` (table abbreviation). To add a model to the pool, add a line here plus
   its `models:{}` label in both languages. Only GLOBAL models that cover Malaysia
   and carry reliable archived precipitation are included. */
const MODEL_POOL = [
  { key:"ifs",  api:"ecmwf_ifs",          cssVar:"--m1", short:"IFS"  },
  { key:"icon", api:"icon_seamless",      cssVar:"--m2", short:"ICON" },
  { key:"jma",  api:"jma_gsm",            cssVar:"--m3", short:"JMA"  },
  { key:"cma",  api:"cma_grapes_global",  cssVar:"--m1", short:"CMA"  },
  { key:"gem",  api:"gem_global",         cssVar:"--m2", short:"GEM"  },
  { key:"gfs",  api:"gfs_seamless",       cssVar:"--m3", short:"GFS"  },
];
const DEFAULT_SELECTION = ["ifs","icon","jma","cma","gem","gfs"];  // research: all six active
const MAX_ACTIVE = 6;   // research build: up to 6 models at once
const MIN_ACTIVE = 1;   // need at least 1 to compare

/* Six distinct colours assigned to active models by display position. */
const SLOT_VARS = ["--m1","--m2","--m3","--m4","--m5","--m6"];

function poolModel(key){ return MODEL_POOL.find(m=>m.key===key); }

/* The active models for the current selection, in display order, each given a
   distinct slot colour. This replaces the old fixed MODELS array — sync, scoring,
   verdict and table all loop over MODELS(). */
function MODELS(){
  const sel = (state && state.selection && state.selection.length) ? state.selection : DEFAULT_SELECTION;
  return sel.map((key,i)=>{
    const m = poolModel(key);
    return m ? { ...m, cssVar: SLOT_VARS[i] } : null;
  }).filter(Boolean);

/* Seed version. Bump this whenever SEED_FARMS gains entries that existing installs
   should receive. The migration below re-runs whenever the stored version is older,
   adding only the genuinely new (name+region) pairings. */
const SEED_VERSION = 5;  // v1: 106 · v2: dual-region · v3: Bentong Team · v4: Jerantut 中文 · v5: Miketam 中文

/* Region label corrections for already-seeded installs: old string → new string.
   Applied before the add-new step so renamed farms aren't re-added as duplicates. */
const REGION_RENAMES = { "Jerantut": "Jerantut 而连突", "Miketam": "Miketam 苏晓薇" };

if(!state.seeded && (!state.locations || state.locations.length===0)){
  state.locations = SEED_FARMS.map(([name,lat,lon,region],i)=>({
    id:"L"+Date.now().toString(36)+i.toString(36), name, lat, lon, region
  }));
  state.seeded = true;
  state.seedVersion = SEED_VERSION;
  save();
}

/* Migration for already-seeded installs: rename any outdated region labels, add any
   SEED_FARMS entry whose exact name+region pairing isn't present yet, and back-fill
   the region tag onto older seeds that predate region grouping. Idempotent — the
   name+region existence check means re-running never duplicates; the version gate
   means it only does work when the seed set has changed. Never removes or touches
   user-added farms. */
if(state.seeded && state.locations && (state.seedVersion||0) < SEED_VERSION){
  // rename outdated region labels (e.g. Jerantut → Jerantut 而连突)
  for(const loc of state.locations){
    if(loc.region && REGION_RENAMES[loc.region]) loc.region = REGION_RENAMES[loc.region];
  }
  // back-fill region onto any seeded farm that lacks it (match by coordinate)
  for(const loc of state.locations){
    if(loc.region) continue;
    const hit = SEED_FARMS.find(([n,la,lo])=>
      Math.abs(la-(+loc.lat))<1e-4 && Math.abs(lo-(+loc.lon))<1e-4);
    if(hit) loc.region = hit[3];
  }
  // add any (name+region) seed entry not already present
  const have = new Set(state.locations.map(l=>`${l.name}@@${l.region||""}`));
  SEED_FARMS.forEach(([name,lat,lon,region],i)=>{
    if(!have.has(`${name}@@${region}`)){
      state.locations.push({ id:"Lm"+Date.now().toString(36)+i.toString(36), name, lat, lon, region });
      have.add(`${name}@@${region}`);
    }
  });
  state.seedVersion = SEED_VERSION;
  save();
}

function load(){
  try{ const s = JSON.parse(localStorage.getItem(STORE_KEY)); if(s&&s.locations){
    if(!Array.isArray(s.selection) || s.selection.length===0) s.selection = DEFAULT_SELECTION.slice();
    return s;
  } }catch(e){}
  return { locations:[], records:{}, selection:DEFAULT_SELECTION.slice() };
}

/* ---------- date helpers (local Asia/Kuching calendar days) ---------- */
function ymd(d){ // format a Date as YYYY-MM-DD in TZ
  return new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"}).format(d);
}
function todayYMD(){ return ymd(new Date()); }
function daysAgoYMD(n){ const d=new Date(); d.setDate(d.getDate()-n); return ymd(d); }
function dateRange(n){ const out=[]; for(let i=n-1;i>=0;i--) out.push(daysAgoYMD(i)); return out; }
function shortDate(s){ const [y,m,d]=s.split("-"); return `${+m}/${+d}`; }

/* Distance between two GPS points in metres (haversine).
   Used to decide whether a coordinate edit keeps the comparison history:
   within MOVE_KEEP_M the points share the same weather grid cell, so the
   forecast/actual records remain valid. */
const MOVE_KEEP_M = 1000; // 1 km
function distM(lat1, lon1, lat2, lon2){
  const R = 6371000, rad = Math.PI/180;
  const dLat=(lat2-lat1)*rad, dLon=(lon2-lon1)*rad;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(a)));
}

/* ---------- API: fetch with gentle retry (Open-Meteo 429/503 throttle aware) ---------- */
async function fetchJSON(url, tries=4){
  let lastErr;
  for(let i=0;i<tries;i++){
    try{
      const r = await fetch(url);
      if(r.status===429 || r.status===503){
        // honour Retry-After if the server sends it, else exponential-ish backoff with jitter
        const ra = parseInt(r.headers.get("retry-after")||"",10);
        const wait = (!isNaN(ra) ? ra*1000 : (1500 * Math.pow(1.8, i))) + Math.random()*1200;
        await sleep(Math.min(wait, 12000));
        continue;
      }
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }catch(e){ lastErr=e; await sleep(900+Math.random()*900); }
  }
  throw lastErr || new Error("fetch failed");
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* Run async tasks with limited concurrency (pool), so we never fire all model
   requests at once — that is what trips Open-Meteo's 429 rate limit. */
async function runPooled(items, worker, concurrency=2){
  const results = new Array(items.length);
  let idx = 0;
  async function next(){
    const i = idx++;
    if(i>=items.length) return;
    try{ results[i] = await worker(items[i], i); }
    catch(e){ results[i] = undefined; }
    return next();
  }
  const runners = [];
  for(let c=0;c<Math.min(concurrency, items.length);c++) runners.push(next());
  await Promise.all(runners);
  return results;
}

/* Sum hourly precipitation into per-local-day totals.
   The Previous Runs API returns hourly arrays; we bucket by local date. */
function bucketHourly(times, values){
  const out = {};
  if(!times||!values) return out;
  for(let i=0;i<times.length;i++){
    const day = times[i].slice(0,10); // API already returns local time when timezone set
    const v = values[i];
    if(v==null) continue;
    out[day] = (out[day]||0) + v;
  }
  // round to 1 dp
  for(const k in out) out[k] = Math.round(out[k]*10)/10;
  return out;
}

/* Pull the "as-forecast 1 day ahead" daily totals for one model.
   day1 offset = what was predicted 24h before that day — the honest forecast. */
async function fetchForecastDaily(lat, lon, model, pastDays){
  const params = new URLSearchParams({
    latitude:lat, longitude:lon, timezone:TZ,
    past_days:String(Math.min(pastDays,7)), forecast_days:"1",
    hourly:"precipitation_previous_day1"
  });
  if(model) params.set("models", model);
  const j = await fetchJSON(`${PREV_HOST}?${params}`);
  return bucketHourly(j.hourly?.time, j.hourly?.precipitation_previous_day1);
}

/* Actual daily rain from ERA5 archive (precipitation_sum already daily). */
async function fetchActualDaily(lat, lon, startYMD, endYMD){
  const params = new URLSearchParams({
    latitude:lat, longitude:lon, timezone:TZ,
    start_date:startYMD, end_date:endYMD,
    daily:"precipitation_sum"
  });
  const j = await fetchJSON(`${ARCH_HOST}?${params}`);
  const out={}; const t=j.daily?.time||[], p=j.daily?.precipitation_sum||[];
  for(let i=0;i<t.length;i++) if(p[i]!=null) out[t[i]] = Math.round(p[i]*10)/10;
  return out;
}

/* ---------- the sync routine: log-on-open + 7-day gap-fill + ERA5 actuals ---------- */
async function syncLocation(loc, pastDays, onStep, force){
  const recs = state.records[loc.id] || (state.records[loc.id]={});
  // Per-day fetch cache: once a model is logged today, today's open already has
  // its data — past-day forecasts don't change, so skip refetching to spare the API.
  const today = todayYMD();
  const fc = (state.fetchedOn = state.fetchedOn || {});
  const locFc = (fc[loc.id] = fc[loc.id] || {});

  // 1) Forecasts: recover last min(pastDays,7) days from Previous Runs for every model.
  onStep && onStep("forecast");
  const models = MODELS();
  // only fetch models not already fetched today for this location
  const toFetch = force ? models : models.filter(m => locFc[m.key] !== today);
  if(toFetch.length){
    const results = await runPooled(
      toFetch,
      m => fetchForecastDaily(loc.lat, loc.lon, m.api, pastDays).catch(()=>({})),
      2   // at most 2 model requests in flight — keeps us under Open-Meteo's rate limit
    );
    results.forEach((daily, i) => {
      const key = toFetch[i].key;
      let gotAny = false;
      for(const day in (daily||{})){
        recs[day] = recs[day] || {};
        if(recs[day][key]==null) recs[day][key] = daily[day];  // first capture wins (honest record)
        gotAny = true;
      }
      if(gotAny) locFc[key] = today;   // mark fetched today only if data actually came back
    });
  }

  // 2) Actuals: ERA5 over the whole requested window (safe to refresh; truth doesn't change)
  onStep && onStep("actual");
  const start = daysAgoYMD(pastDays-1), end = todayYMD();
  // actuals also cached per day — only refetch once per calendar day
  if(force || locFc.__actual !== today){
    try{
      const act = await fetchActualDaily(loc.lat, loc.lon, start, end);
      for(const day in act){ recs[day]=recs[day]||{}; recs[day].actual=act[day]; }
      locFc.__actual = today;
    }catch(e){ /* ERA5 lag: recent days simply stay pending */ }
  }

  save();
}

/* ---------- scoring ---------- */
function scoreLocation(locId, n){
  const recs = state.records[locId]||{};
  const days = dateRange(n);
  const rows=[];
  const models = MODELS();
  // per-model accumulators
  const acc = {}; models.forEach(m=>acc[m.key]={
    absSum:0, maeN:0, hits:0, hitN:0,
    biasSum:0,            // Σ(forecast − actual): + = runs wet, − = runs dry
    missRain:0,           // model said dry, it actually rained (dangerous)
    falseAlarm:0          // model said rain, it stayed dry (annoying)
  });
  let anyCmp = 0;  // days where actual exists AND at least one model has a value

  for(const day of days){
    const r = recs[day]||{};
    const row = { day, actual:r.actual, vals:{}, errs:{}, hits:{} };
    let rowHasModel = false;
    for(const m of models){
      const v = r[m.key];
      row.vals[m.key] = v;
      if(v!=null) rowHasModel = true;
      if(r.actual!=null && v!=null){
        const err = Math.round((v - r.actual)*10)/10;
        row.errs[m.key] = err;
        acc[m.key].absSum += Math.abs(v - r.actual); acc[m.key].maeN++;
        acc[m.key].biasSum += (v - r.actual);
        const fcWet = v>=DRY_THRESHOLD, actWet = r.actual>=DRY_THRESHOLD;
        const hit = fcWet === actWet;
        row.hits[m.key] = hit;
        acc[m.key].hitN++; if(hit) acc[m.key].hits++;
        if(!hit){
          if(actWet && !fcWet) acc[m.key].missRain++;     // rained but model said dry
          else if(!actWet && fcWet) acc[m.key].falseAlarm++; // dry but model said rain
        }
      }
    }
    if(r.actual!=null && rowHasModel) anyCmp++;
    if(rowHasModel || r.actual!=null) rows.push(row);
  }

  // build per-model measures (null if that model has no comparable days)
  const mae={}, hit={}, bias={}, miss={}, falarm={}; let haveMae=false, haveHit=false;
  for(const m of models){
    const a=acc[m.key];
    if(a.maeN){
      mae[m.key]=Math.round(a.absSum/a.maeN*10)/10; haveMae=true;
      bias[m.key]=Math.round(a.biasSum/a.maeN*10)/10;  // mean signed error
    } else { mae[m.key]=null; bias[m.key]=null; }
    if(a.hitN){
      hit[m.key]=Math.round(a.hits/a.hitN*100); haveHit=true;
      miss[m.key]=a.missRain; falarm[m.key]=a.falseAlarm;
    } else { hit[m.key]=null; miss[m.key]=null; falarm[m.key]=null; }
  }
  return {
    rows,
    mae: haveMae? mae : null,
    hit: haveHit? hit : null,
    bias: haveMae? bias : null,
    miss: haveHit? miss : null,
    falarm: haveHit? falarm : null,
    cmpN: anyCmp
  };
}

/* pick the model key with the lowest MAE (amount) or highest hit% (dry/wet).
   Returns {key, tie} — tie true when the top two are equal. */
function bestByMae(mae){
  const entries = MODELS().map(m=>[m.key, mae[m.key]]).filter(([k,v])=>v!=null);
  if(!entries.length) return null;
  entries.sort((a,b)=>a[1]-b[1]);
  const top = entries[0][1];
  const leaders = entries.filter(([k,v])=>v===top).map(([k])=>k);
  const tie = leaders.length>1;
  // for MAE "level" means the best and worst are within ~0.5 mm/day
  const spread = entries[entries.length-1][1] - top;
  const allLevel = entries.length>1 && spread<=0.5;
  return { key:entries[0][0], tie, leaders, value:top, allLevel };
}
function bestByHit(hit){
  const entries = MODELS().map(m=>[m.key, hit[m.key]]).filter(([k,v])=>v!=null);
  if(!entries.length) return null;
  entries.sort((a,b)=>b[1]-a[1]);
  const top = entries[0][1];
  const leaders = entries.filter(([k,v])=>v===top).map(([k])=>k);  // all models sharing the top score
  const tie = leaders.length>1;
  // "all level" only when the spread is genuinely small (top vs bottom within 1 step)
  const spread = top - entries[entries.length-1][1];
  const allLevel = entries.length>1 && spread<=0.5;
  return { key:entries[0][0], tie, leaders, value:top, allLevel };
}
function modelLabel(key){ return T().models[key] || key; }
function modelCss(key){ const m=MODELS().find(x=>x.key===key); return m?m.cssVar:"--m1"; }

/* Dense rank of each model on a metric. dir="asc" → lower value is rank 1 (MAE);
   dir="desc" → higher value is rank 1 (dry/wet). Ties share a rank (1,1,1,2…).
   Returns { key: rankNumber }. Models with null values are omitted. */
function rankBy(values, dir){
  const entries = MODELS().map(m=>[m.key, values?values[m.key]:null]).filter(([k,v])=>v!=null);
  entries.sort((a,b)=> dir==="asc" ? a[1]-b[1] : b[1]-a[1]);
  const ranks={}; let rank=0, prev=null;
  for(const [k,v] of entries){
    if(prev===null || v!==prev){ rank++; prev=v; }
    ranks[k]=rank;
  }
  return ranks;
}

function renderLocList(){

      head.addEventListener("click",(e)=>{
        if(e.target.classList.contains("lg-refresh")) return;  // handled separately
        if(expandedGroups.has(region)) expandedGroups.delete(region);

        renderLocList();

      if(rb) rb.addEventListener("click",(e)=>{ e.stopPropagation(); refreshRegion(region); });

function renderVerdict(){
  const mount=$("#verdictMount"), t=T();
  if(!activeLoc){ mount.innerHTML=`<div class="card"><div class="empty">${t.pickLoc}</div></div>`; return; }
  const loc=state.locations.find(l=>l.id===activeLoc);
  const sc=scoreLocation(activeLoc, range);
  if(!sc.mae){ mount.innerHTML=`<div class="card"><div class="empty">${t.noData}</div></div>`; return; }

  const winMae = bestByMae(sc.mae);
  const winHit = sc.hit? bestByHit(sc.hit) : null;
  // dense ranks: MAE lower-is-better, dry/wet higher-is-better
  const maeRank = rankBy(sc.mae, "asc");
  const hitRank = sc.hit ? rankBy(sc.hit, "desc") : {};

  // model columns
  let cols="";
  for(const m of MODELS()){
    const isBaseline = m.key==="ifs";
    const maeWin = winMae && winMae.key===m.key && !winMae.tie;
    const maeVal = sc.mae[m.key]==null? "—" : sc.mae[m.key];
    const hitVal = (sc.hit && sc.hit[m.key]!=null)? sc.hit[m.key] : null;
    const maeBadge = maeRank[m.key]? `<span class="rankb ${maeRank[m.key]===1?'r1':''}">#${maeRank[m.key]}</span>` : "";
    const hitBadge = hitRank[m.key]? `<span class="rankb ${hitRank[m.key]===1?'r1':''}">#${hitRank[m.key]}</span>` : "";
    // bias direction: + runs wet, − runs dry
    const bz = sc.bias? sc.bias[m.key] : null;
    const biasLine = (bz==null)? "" :
      `<div class="subm">${bz>0?`<span class="bias wet">+${bz} ${t.biasWet}</span>`
                          : bz<0?`<span class="bias dry">${bz} ${t.biasDry}</span>`
                          : `<span class="bias zero">${t.biasNone}</span>`}</div>`;
    // missed-rain vs false-alarm counts
    const mr2 = sc.miss? sc.miss[m.key] : null;
    const fa  = sc.falarm? sc.falarm[m.key] : null;
    const errLine = (mr2==null && fa==null)? "" :
      `<div class="subm errsplit">
         <span class="miss" title="${t.missRainFull}">⚠ ${mr2||0} ${t.missRain}</span>
         <span class="fa" title="${t.falseAlarmFull}">○ ${fa||0} ${t.falseAlarm}</span>
       </div>`;
    cols += `
      <div class="mcol ${maeWin?'winner':''}" style="--mc:var(${m.cssVar})">
        ${maeWin?`<div class="crown">${t.winner}</div>`:''}
        <div class="mname" style="color:var(${m.cssVar})">${modelLabel(m.key)}</div>
        ${isBaseline?`<div class="basetag">${t.baseline}</div>`:'<div class="basetag">&nbsp;</div>'}
        <div class="metric"><div class="mlabel">${t.mae} ${maeBadge}</div>
          <div class="mval">${maeVal}<span class="munit"> ${t.maeUnit}</span></div>
          ${biasLine}</div>
        ${hitVal!=null?`<div class="metric"><div class="mlabel">${t.hit} ${hitBadge}</div>
          <div class="mval">${hitVal}<span class="munit">%</span></div>
          ${errLine}</div>`:''}
      </div>`;
  }

  // verdict lines
  const W=(key)=>({name:modelLabel(key), cls:cssClassFor(key)});
  // join model names with the language's list separator
  const joinNames = (keys)=> keys.map(k=>`<b class="${cssClassFor(k)}">${modelLabel(k)}</b>`).join(t.listSep);
  // amount line
  let amtLine;
  if(winMae.allLevel) amtLine = t.tieAmt;                       // genuinely all close
  else if(winMae.tie)  amtLine = t.coLeadAmt(joinNames(winMae.leaders));  // 2+ share the top
  else                 amtLine = t.bestAmt(W(winMae.key));      // single winner
  // dry/wet line
  let hitLine = "";
  if(winHit){
    if(winHit.allLevel) hitLine = t.tieHit;
    else if(winHit.tie) hitLine = t.coLeadHit(joinNames(winHit.leaders));
    else                hitLine = t.bestHit(W(winHit.key));
  }

  // baseline recommendation: does a non-IFS model beat IFS on amount?
  let baseLine = "";
  if(winMae && !winMae.tie){
    if(winMae.key==="ifs") baseLine = t.baseIsBest;
    else baseLine = t.betterThanBase(W(winMae.key));
  } else if(winMae && winMae.tie && winMae.leaders.includes("ifs")){
    baseLine = t.baseIsBest;  // IFS is among the joint winners → no need to switch
  }

  mount.innerHTML=`
  <div class="verdict">
    <div class="head">
      <div class="loc-nm">${esc(loc.name)}</div>
      <div class="span">${sc.cmpN} ${t.days} · ${range}d ${confidencePill(sc.cmpN)}</div>
    </div>
    <div class="vs vs3">${cols}</div>
    <div class="line">${amtLine}${hitLine?"<br>"+hitLine:""}</div>
    ${baseLine?`<div class="baseline-rec">${baseLine}</div>`:''}
    <div class="dualnote">${t.dualnote}</div>
    <button class="share-btn" id="btnShare" type="button">${t.shareWA}</button>
  </div>`;
  const sb=$("#btnShare");
  if(sb) sb.addEventListener("click", ()=>shareVerdict(loc, sc));
}

/* Confidence in the ranking, based on how many days have been scored. The dry/wet
   metric especially needs ~2+ weeks before differences mean much. */
function confidenceLevel(cmpN){
  if(cmpN < 8)  return "low";
  if(cmpN < 20) return "mid";
  return "high";
}
function confidencePill(cmpN){
  const t=T(), lvl=confidenceLevel(cmpN);
  const label = lvl==="low"? t.confLow : lvl==="mid"? t.confMid : t.confHigh;
  return `<span class="conf conf-${lvl}">${label}</span>`;
}
/* map a model key to its verdict-text colour class (defined inline below) */
function cssClassFor(key){
  // colour the verdict text to match the card's slot colour (positional), so a
  // subset selection stays visually consistent between cards and sentences.
  const idx = MODELS().findIndex(m=>m.key===key);
  return idx>=0 ? "m-slot"+(idx+1) : "m-slot1";
}

/* Build a plain-text WhatsApp summary of a location's scorecard. Mirrors the
   verdict card but as text a farmer can read in a chat. No HTML, no colours. */
function buildShareText(loc, sc){
  const t=T();
  const lines=[];
  lines.push(`🌧️ ${t.brandName} — ${loc.name}`);
  // header with confidence so the reader knows how much to trust it
  const confTxt = t["conf"+(confidenceLevel(sc.cmpN).charAt(0).toUpperCase()+confidenceLevel(sc.cmpN).slice(1))];
  lines.push(`${sc.cmpN} ${t.days} · ${range}d · ${confTxt}`);
  lines.push("");
  // per-model: MAE (with bias direction) and dry/wet (with missed/false counts)
  for(const m of MODELS()){
    const mae = sc.mae && sc.mae[m.key]!=null ? sc.mae[m.key] : null;
    const hit = sc.hit && sc.hit[m.key]!=null ? sc.hit[m.key] : null;
    if(mae==null && hit==null) continue;
    const base = m.key==="ifs" ? ` (${t.baseline})` : "";
    lines.push(`${modelLabel(m.key)}${base}`);
    if(mae!=null){
      const bz = sc.bias? sc.bias[m.key] : null;
      const biasTxt = (bz==null||bz===0)? "" :
        (bz>0 ? ` (+${bz} ${t.biasWet})` : ` (${bz} ${t.biasDry})`);
      lines.push(`  ${t.mae}: ${mae} ${t.maeUnit}${biasTxt}`);
    }
    if(hit!=null){
      const mr = sc.miss? (sc.miss[m.key]||0) : 0;
      const fa = sc.falarm? (sc.falarm[m.key]||0) : 0;
      lines.push(`  ${t.hit}: ${hit}% (${t.missRain} ${mr} · ${t.falseAlarm} ${fa})`);
    }
  }
  lines.push("");
  // verdict sentences (strip any HTML tags from the i18n strings)
  const winMae = bestByMae(sc.mae);
  const winHit = sc.hit? bestByHit(sc.hit) : null;
  const strip = s => s.replace(/<[^>]+>/g,"");
  const plainNames = (keys)=> keys.map(k=>modelLabel(k)).join(t.listSep);
  if(winMae){
    if(winMae.allLevel) lines.push(strip(t.tieAmt));
    else if(winMae.tie) lines.push(strip(t.coLeadAmt(plainNames(winMae.leaders))));
    else lines.push(strip(t.bestAmt({name:modelLabel(winMae.key),cls:""})));
  }
  if(winHit){
    if(winHit.allLevel) lines.push(strip(t.tieHit));
    else if(winHit.tie) lines.push(strip(t.coLeadHit(plainNames(winHit.leaders))));
    else lines.push(strip(t.bestHit({name:modelLabel(winHit.key),cls:""})));
  }
  if(winMae && (!winMae.tie || winMae.leaders.includes("ifs"))){
    lines.push("");
    if(winMae.key==="ifs" || (winMae.tie && winMae.leaders.includes("ifs")))
      lines.push(strip(t.baseIsBest));
    else
      lines.push(strip(t.betterThanBase({name:modelLabel(winMae.key),cls:""})));
  }
  return lines.join("\n");
}

/* ---------- CSV export (tidy / long format for R, Python, Excel) ----------
   One row per (date × model): the raw paired data a statistician needs to run
   their own verification — RMSE, POD/FAR, bootstrap CIs, whatever they prefer. */
function buildCSV(loc, n){
  const sc = scoreLocation(loc.id, n);
  const models = MODELS();
  const rows = [];
  // header — documents lead time and ground truth so the file is self-describing
  rows.push([
    "location","latitude","longitude","date","model","model_api",
    "forecast_mm","actual_mm","error_mm","forecast_wet","actual_wet","drywet_correct",
    "lead_time","ground_truth"
  ].join(","));
  const LEAD = "24h (precipitation_previous_day1)";
  const GT = "ERA5 reanalysis (archive-api)";
  const esc = s => {
    const v = String(s==null?"":s);
    return /[",\n]/.test(v) ? `"${v.replace(/"/g,'""')}"` : v;
  };
  for(const r of sc.rows){
    for(const m of models){
      const f = r.vals[m.key];
      if(f==null && r.actual==null) continue;
      const a = r.actual;
      const err = (f!=null && a!=null) ? Math.round((f-a)*10)/10 : "";
      const fWet = f!=null ? (f>=DRY_THRESHOLD?1:0) : "";
      const aWet = a!=null ? (a>=DRY_THRESHOLD?1:0) : "";
      const correct = (f!=null && a!=null) ? ((fWet===aWet)?1:0) : "";
      rows.push([
        esc(loc.name), loc.lat, loc.lon, r.day, m.key, m.api,
        f==null?"":f, a==null?"":a, err, fWet, aWet, correct,
        esc(LEAD), esc(GT)
      ].join(","));
    }
  }
  return rows.join("\n");
}
function exportCSV(){
  if(!activeLoc) return;
  const loc = state.locations.find(l=>l.id===activeLoc);
  if(!loc) return;
  const csv = buildCSV(loc, range);
  const stamp = todayYMD();
  const safe = (loc.name||"location").replace(/[^\w\u4e00-\u9fff-]+/g,"_").slice(0,40);
  const fname = `rainscore_${safe}_${range}d_${stamp}.csv`;
  const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8"}); // BOM for Excel/CJK
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

/* Open a preview modal with the editable message. The farmer can tweak the text
   or add a personal note before sending — then Send opens WhatsApp / share sheet. */
function shareVerdict(loc, sc){
  const text = buildShareText(loc, sc);
  openShareModal(text);
}

let shareModalEl = null;
function openShareModal(initialText){
  const t = T();
  closeShareModal();  // ensure only one
  const ov = document.createElement("div");
  ov.className = "modal-ov";
  ov.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <span>${t.previewTitle}</span>
        <button class="icon-btn" id="shClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-hint">${t.previewHint}</div>
      <textarea id="shText" class="modal-ta" rows="12" aria-label="${t.previewTitle}"></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="shCopy" type="button">${t.copyBtn}</button>
        <button class="btn share-btn" id="shSend" type="button" style="margin-top:0">${t.sendWA}</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  shareModalEl = ov;
  const ta = ov.querySelector("#shText");
  ta.value = initialText;
  // close on overlay click (but not when clicking inside the modal)
  ov.addEventListener("click", e=>{ if(e.target===ov) closeShareModal(); });
  ov.querySelector("#shClose").addEventListener("click", closeShareModal);
  ov.querySelector("#shCopy").addEventListener("click", async ()=>{
    try{ await navigator.clipboard.writeText(ta.value); showToast(T().copied); }
    catch(e){ ta.select(); document.execCommand && document.execCommand("copy"); showToast(T().copied); }
  });
  ov.querySelector("#shSend").addEventListener("click", ()=> sendToWhatsApp(ta.value));
}
function closeShareModal(){
  if(shareModalEl){ shareModalEl.remove(); shareModalEl=null; }
}

/* Send the (possibly edited) text. Native share sheet first, then wa.me, then clipboard. */
async function sendToWhatsApp(text){
  closeShareModal();
  if(navigator.share){
    try{ await navigator.share({ text }); return; }
    catch(e){ if(e && e.name==="AbortError") return; }
  }
  const wa = "https://wa.me/?text=" + encodeURIComponent(text);
  const win = window.open(wa, "_blank");
  if(win) return;
  try{ await navigator.clipboard.writeText(text); showToast(T().copied); }
  catch(e){ showToast(T().shareFail); }
}

/* ---------- model selection ---------- */
function renderModelChips(){
  const wrap=$("#modelsChips"); if(!wrap) return;
  wrap.innerHTML = MODELS().map(m=>
    `<span class="mchip" style="border-color:var(${m.cssVar});color:var(${m.cssVar})">${modelLabel(m.key)}</span>`
  ).join("");
  const lbl=$("#t_modelsLabel"); if(lbl) lbl.textContent=T().modelsLabel;
}

let modelModalEl = null;
function openModelPicker(){
  const t=T();
  closeModelPicker();
  // working copy of the selection the user edits
  let working = (state.selection||DEFAULT_SELECTION).slice();
  const ov=document.createElement("div");
  ov.className="modal-ov";
  ov.innerHTML=`
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <span>${t.pickTitle}</span>
        <button class="icon-btn" id="mpClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-hint">${t.pickHint}</div>
      <div class="mp-list" id="mpList"></div>
      <div class="mp-note" id="mpNote"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="mpCancel" type="button">${t.cancel}</button>
        <button class="btn share-btn" id="mpSave" type="button" style="margin-top:0;background:var(--rain)">${t.save}</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  modelModalEl=ov;

  function paint(){
    const list=ov.querySelector("#mpList");
    list.innerHTML = MODEL_POOL.map(m=>{
      const on = working.includes(m.key);
      const idx = working.indexOf(m.key);
      const order = on? `<span class="mp-order">${idx+1}</span>` : "";
      return `<button class="mp-item ${on?'on':''}" data-k="${m.key}" type="button">
          <span class="mp-check">${on?'✓':''}</span>
          <span class="mp-name">${modelLabel(m.key)}</span>
          ${order}
        </button>`;
    }).join("");
    const note=ov.querySelector("#mpNote");
    const saveBtn=ov.querySelector("#mpSave");
    if(working.length<MIN_ACTIVE){
      note.textContent = t.pickAtLeast(MIN_ACTIVE) + " (" + working.length + "/" + MAX_ACTIVE + ")";
      note.classList.add("warn");
      saveBtn.disabled=true; saveBtn.style.opacity="0.5";
    } else {
      note.textContent = t.pickReadyN(working.length);
      note.classList.remove("warn");
      saveBtn.disabled=false; saveBtn.style.opacity="1";
    }
    list.querySelectorAll(".mp-item").forEach(b=>{
      b.addEventListener("click",()=>{
        const k=b.dataset.k;
        const i=working.indexOf(k);
        if(i>=0){ working.splice(i,1); }              // deselect
        else if(working.length<MAX_ACTIVE){ working.push(k); }  // select if room
        else { showToast(t.pickFull(MAX_ACTIVE)); return; }     // already full
        paint();
      });
    });
  }
  paint();

  ov.addEventListener("click",e=>{ if(e.target===ov) closeModelPicker(); });
  ov.querySelector("#mpClose").addEventListener("click",closeModelPicker);
  ov.querySelector("#mpCancel").addEventListener("click",closeModelPicker);
  ov.querySelector("#mpSave").addEventListener("click",()=>{
    if(working.length<MIN_ACTIVE) return;
    const changed = working.join(",") !== (state.selection||[]).join(",");
    state.selection = working.slice();
    save();
    closeModelPicker();
    renderModelChips();
    renderVerdict(); renderCharts(); renderTable();
    if(changed && activeLoc) doSync(true);   // pull data for any newly-added model
  });
}
function closeModelPicker(){ if(modelModalEl){ modelModalEl.remove(); modelModalEl=null; } }

/* ---------- charts (lightweight inline SVG, no library) ---------- */
function renderCharts(){
  const mount=$("#chartsMount"); if(!mount) return;
  const t=T();
  if(!activeLoc){ mount.innerHTML=""; return; }
  const sc=scoreLocation(activeLoc, range);
  if(!sc.mae){ mount.innerHTML=""; return; }
  const models=MODELS();
  const cv=(m)=>getComputedStyle(document.documentElement).getPropertyValue(m.cssVar).trim()||"#5dd0c0";

  // ---- Chart 1: MAE ranking bars (lower = better) ----
  const maeVals = models.map(m=>({m, v:sc.mae[m.key]})).filter(x=>x.v!=null);
  let barsChart="";
  if(maeVals.length){
    const maxV = Math.max(...maeVals.map(x=>x.v), 0.1);
    const sorted = maeVals.slice().sort((a,b)=>a.v-b.v); // best first
    const rowH=26, padL=64, padR=40, w=320, h=sorted.length*rowH+10;
    let rows="";
    sorted.forEach((x,i)=>{
      const bw=(w-padL-padR)*(x.v/maxV);
      const y=i*rowH+8;
      rows+=`<text x="${padL-6}" y="${y+11}" text-anchor="end" font-size="11" fill="var(--ink)" font-weight="600">${modelLabel(x.m.key)}</text>
        <rect x="${padL}" y="${y+2}" width="${Math.max(bw,2)}" height="13" rx="3" fill="${cv(x.m)}"/>
        <text x="${padL+Math.max(bw,2)+5}" y="${y+11}" font-size="10.5" fill="var(--ink2)">${x.v}</text>`;
    });
    barsChart=`<div class="chart-block">
      <div class="chart-h">${t.chartMae}</div>
      <svg viewBox="0 0 ${w} ${h}" class="chartsvg">${rows}</svg>
    </div>`;
  }

  // ---- Chart 2: forecast-vs-actual scatter, small multiples ----
  // collect paired (forecast, actual) points per model from rows
  const pts={}; models.forEach(m=>pts[m.key]=[]);
  let gmax=1;
  for(const r of sc.rows){
    if(r.actual==null) continue;
    for(const m of models){
      const v=r.vals[m.key];
      if(v==null) continue;
      pts[m.key].push([v, r.actual]);
      gmax=Math.max(gmax, v, r.actual);
    }
  }
  gmax=Math.ceil(gmax/5)*5||5;
  const cells = models.filter(m=>pts[m.key].length).map(m=>{
    const s=110, pad=18;
    const sx=v=>pad+(s-2*pad)*(v/gmax);
    const sy=v=>s-pad-(s-2*pad)*(v/gmax); // invert y
    const dots=pts[m.key].map(([f,a])=>`<circle cx="${sx(f).toFixed(1)}" cy="${sy(a).toFixed(1)}" r="2.6" fill="${cv(m)}" opacity="0.85"/>`).join("");
    return `<div class="scatter-cell">
      <div class="scatter-name" style="color:${cv(m)}">${modelLabel(m.key)}</div>
      <svg viewBox="0 0 ${s} ${s}" class="scattersvg">
        <line x1="${pad}" y1="${s-pad}" x2="${s-pad}" y2="${pad}" stroke="var(--line)" stroke-width="1" stroke-dasharray="3 3"/>
        <line x1="${pad}" y1="${s-pad}" x2="${s-pad}" y2="${s-pad}" stroke="var(--line)" stroke-width="1"/>
        <line x1="${pad}" y1="${s-pad}" x2="${pad}" y2="${pad}" stroke="var(--line)" stroke-width="1"/>
        ${dots}
      </svg>
    </div>`;
  }).join("");
  const scatterChart = cells? `<div class="chart-block">
      <div class="chart-h">${t.chartScatter}</div>
      <div class="chart-sub">${t.chartScatterSub}</div>
      <div class="scatter-grid">${cells}</div>
    </div>` : "";

  // ---- Chart 3: error-over-time grouped bars ----
  const dayRows = sc.rows.filter(r=>r.actual!=null && models.some(m=>r.errs[m.key]!=null));
  let timeChart="";
  if(dayRows.length){
    const maxAbs = Math.max(1, ...dayRows.flatMap(r=>models.map(m=>r.errs[m.key]!=null?Math.abs(r.errs[m.key]):0)));
    const colW = Math.max(34, Math.min(60, Math.floor(560/dayRows.length)));
    const w = dayRows.length*colW+50, h=150, mid=h/2, padB=22;
    const barAreaH=(h-padB)/2-6;
    const bw = Math.max(2, (colW-8)/models.length);
    let groups="";
    dayRows.forEach((r,di)=>{
      const gx=40+di*colW;
      models.forEach((m,mi)=>{
        const e=r.errs[m.key];
        if(e==null) return;
        const bh=barAreaH*(Math.abs(e)/maxAbs);
        const x=gx+mi*bw;
        const y=e>=0? mid-bh : mid;
        groups+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-1).toFixed(1)}" height="${Math.max(bh,1).toFixed(1)}" fill="${cv(m)}" opacity="0.9"/>`;
      });
      groups+=`<text x="${gx+(colW-8)/2}" y="${h-7}" text-anchor="middle" font-size="9" fill="var(--ink2)">${shortDate(r.day)}</text>`;
    });
    timeChart=`<div class="chart-block">
      <div class="chart-h">${t.chartTime}</div>
      <div class="chart-sub">${t.chartTimeSub}</div>
      <div class="chart-scroll-x"><svg viewBox="0 0 ${w} ${h}" class="timesvg" style="min-width:${w}px">
        <line x1="36" y1="${mid}" x2="${w-6}" y2="${mid}" stroke="var(--line)" stroke-width="1"/>
        <text x="32" y="${mid-3}" text-anchor="end" font-size="8" fill="var(--ink2)">+</text>
        <text x="32" y="${mid+9}" text-anchor="end" font-size="8" fill="var(--ink2)">−</text>
        ${groups}
      </svg></div>
    </div>`;
  }

  // confidence reminder so charts on thin data aren't over-read
  const confNote = sc.cmpN<8 ? `<div class="chart-warn">${t.chartThin}</div>` : "";

  mount.innerHTML = `<div class="card charts-card">
    <div class="charts-title">${t.chartsTitle}</div>
    ${confNote}
    ${barsChart}${scatterChart}${timeChart}
  </div>`;
}
function renderTable(){
  const mount=$("#tableMount"), t=T();
  if(!activeLoc){ mount.innerHTML=""; return; }
  const sc=scoreLocation(activeLoc, range);
  if(!sc.rows.length){ mount.innerHTML=""; return; }

  // header: Date | <each model fc> | Actual | <each model err>
  const models = MODELS();
  let head = `<th>${t.colDate}</th>`;
  for(const m of models) head += `<th style="color:var(${m.cssVar})">${m.short}</th>`;
  head += `<th>${t.colAct}</th>`;
  for(const m of models) head += `<th style="color:var(${m.cssVar})">${m.short}±</th>`;

  let body="";
  for(const r of sc.rows.slice().reverse()){
    let fcCells="", errCells="";
    for(const m of models){
      const v = r.vals[m.key];
      const hit = r.hits[m.key];
      const dot = hit==null? "" : `<span class="dot ${hit?'hit':'miss'}"></span>`;
      fcCells += `<td style="color:var(${m.cssVar})">${v==null?"—":v}${dot}</td>`;
      const e = r.errs[m.key];
      errCells += `<td style="color:var(${m.cssVar})">${e==null?"—":(e>0?"+":"")+e}</td>`;
    }
    body += `<tr>
      <td>${shortDate(r.day)}</td>
      ${fcCells}
      <td class="${r.actual==null?'pending':'act'}">${r.actual==null?t.pending:r.actual}</td>
      ${errCells}
    </tr>`;
  }

  // footer: MAE row
  let maeCells="";
  for(const m of models){
    const v = sc.mae? sc.mae[m.key] : null;
    maeCells += `<td style="color:var(${m.cssVar})">${v==null?"—":v}</td>`;
  }
  const foot = sc.mae?`<tfoot><tr>
      <td class="label">${t.mae}</td>
      ${maeCells}
      <td></td>
      <td class="label" colspan="${models.length}" style="text-align:right">${t.maeUnit}</td>
    </tr></tfoot>`:"";

  let modelLegend = "";
  for(const m of models) modelLegend += `<span><span class="sw" style="background:var(${m.cssVar})"></span>${modelLabel(m.key)}</span>`;
  const hitLegend = `<span><span class="dot hit"></span>${t.legendHit}</span><span><span class="dot miss"></span>${t.legendMiss}</span>`;

  mount.innerHTML=`
  <div class="card">
    <div class="tbl-scroll"><table>
      <thead><tr>${head}</tr></thead>
      <tbody>${body}</tbody>${foot}
    </table></div>
    <div class="legend">
      <div class="legend-row">${modelLegend}</div>
      <div class="legend-row">${hitLegend}</div>
    </div>
  </div>`;
}
function renderAll(){ applyStaticText(); renderModelChips(); renderLocList(); renderVerdict(); renderCharts(); renderTable(); }

/* ---------- actions ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function uid(){ return "L"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

let editingId = null;  // null = add mode; otherwise editing this location

/* toast with optional inline undo action */
let toastTimer=null;
function showToast(msg, undoFn){
  const el=$("#toast");
  el.innerHTML = esc(msg) + (undoFn? ` <u id="toastUndo">${T().undo}</u>` : "");
  el.classList.add("show");
  if(undoFn){ $("#toastUndo").onclick=()=>{ undoFn(); hideToast(); }; }
  clearTimeout(toastTimer);
  toastTimer=setTimeout(hideToast, undoFn?5000:2200);
}
function hideToast(){ $("#toast").classList.remove("show"); }

/* the form's Save button handles both Add (editingId null) and Update */
function saveLoc(){
  const name=$("#inName").value.trim(), lat=parseFloat($("#inLat").value), lon=parseFloat($("#inLon").value);
  if(!name||isNaN(lat)||isNaN(lon)){ setSyncStatus("needName"); return; }
  if(editingId){
    const loc=state.locations.find(l=>l.id===editingId);
    if(loc){
      const shifted = distM(+loc.lat, +loc.lon, lat, lon);  // metres moved
      const farMove = shifted > MOVE_KEEP_M;                // beyond 1km = different point
      loc.name=name; loc.lat=lat; loc.lon=lon;
      // Within 1km the points share the same weather grid cell, so the existing
      // forecast/actual records stay valid and are kept. A larger move makes the
      // old history belong to a different place, so we reset it.
      if(farMove) state.records[loc.id] = {};
      save();
      closeForm(); renderAll();
      // Re-sync after any coordinate change (refreshes data; keeps records if near).
      if(shifted>0){
        activeLoc=loc.id;
        if(!farMove) showToast(T().keptNear(Math.round(shifted)));
        doSync();
      }
    }
  } else {
    const id=uid();
    state.locations.push({id,name,lat,lon}); save();
    activeLoc=id; closeForm(); renderAll(); doSync();
  }
}
/* form panel open/close (the + header button toggles add-mode) */
function openForm(){
  $("#formPanel").style.display="block";
  $("#btnOpenAdd").classList.add("on");
  $("#btnOpenAdd").textContent="✕";
}
function closeForm(){
  $("#formPanel").style.display="none";
  $("#btnOpenAdd").classList.remove("on");
  $("#btnOpenAdd").textContent="＋";
  if(editingId) endEdit();      // leaving the panel also exits edit mode cleanly
  $("#inName").value=$("#inLat").value=$("#inLon").value="";
  setSyncStatus(null);
}
function toggleForm(){
  if($("#formPanel").style.display==="none"){ openForm(); $("#inName").focus(); }
  else closeForm();
}
function startEdit(id){
  const loc=state.locations.find(l=>l.id===id); if(!loc) return;
  editingId=id;
  $("#inName").value=loc.name; $("#inLat").value=loc.lat; $("#inLon").value=loc.lon;
  openForm();
  const t=T();
  $("#formTitle").textContent=t.update;
  $("#btnAdd").textContent=t.update;
  $("#editingTag").style.display="block"; $("#editingTag").textContent=t.editing(loc.name);
  $("#btnCancelEdit").style.display="block"; $("#btnCancelEdit").textContent=t.cancel;
  $("#formPanel").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function endEdit(){
  editingId=null;
  $("#inName").value=$("#inLat").value=$("#inLon").value="";
  const t=T();
  $("#formTitle").textContent=t.addloc2.replace(/^\+\s*/,"");
  $("#btnAdd").textContent=t.save;
  $("#editingTag").style.display="none";
  $("#btnCancelEdit").style.display="none";
}

/* soft delete: flag deleted, keep records, offer undo. Never hard-wipes here. */
function softDelLoc(id){
  const loc=state.locations.find(l=>l.id===id); if(!loc) return;
  loc.deleted=true; save();
  if(activeLoc===id) activeLoc=activeLocs()[0]?.id||null;
  renderAll();
  showToast(`${T().softDeleted} · ${loc.name}`, ()=>restoreLoc(id, true));
}
function restoreLoc(id, silent){
  const loc=state.locations.find(l=>l.id===id); if(!loc) return;
  delete loc.deleted; save();
  if(!activeLoc) activeLoc=id;
  renderAll();
  if(!silent) showToast(T().restored);
}
/* purge: permanent, irreversible — only affects already-soft-deleted locations */
function purgeBin(){
  if(!confirm(T().confirmPurge)) return;
  for(const loc of deletedLocs()) delete state.records[loc.id];
  state.locations = activeLocs();
  save(); renderAll();
  showToast(T().purged);
}

/* remembers the last sync outcome so the status line can be re-rendered in the
   current language when the user toggles ZH/EN (otherwise it stays frozen). */
let lastSyncState = null;  // null | "syncing" | {synced:n} | "syncErr" | "needName" | "gpsErr" | "gpsOk"
function renderSyncStatus(){
  const st=$("#syncStatus"); if(!st) return;
  const s=lastSyncState, t=T();
  if(s==null){ st.textContent=""; return; }
  if(s==="syncing") st.textContent=t.syncing;
  else if(s==="syncErr") st.textContent=t.syncErr;
  else if(s==="needName") st.textContent=t.needName;
  else if(s==="gpsErr") st.textContent=t.gpsErr;
  else if(s==="gpsOk") st.textContent=t.gpsOk;
  else if(s && s.synced!=null) st.textContent=t.synced(s.synced);
  else st.textContent="";
}
function setSyncStatus(s){ lastSyncState=s; renderSyncStatus(); }

async function doSync(force){
  if(!activeLoc) return;
  const loc=state.locations.find(l=>l.id===activeLoc);
  if(!loc || loc.deleted) return;
  setSyncStatus("syncing");
  try{
    await syncLocation(loc, range, null, force);
    const sc=scoreLocation(activeLoc, range);
    setSyncStatus({synced:sc.cmpN});
    renderVerdict(); renderCharts(); renderTable();
  }catch(e){ setSyncStatus("syncErr"); }
}

/* Bulk-refresh every farm in one region. Each syncLocation already pools its per-model
   requests at concurrency 2, so we run farms sequentially to keep total API load gentle
   (a region can hold 18 farms × up to 6 models). Progress shows in the group header;
   a toast reports the result. If the active farm was refreshed, its scorecard updates. */
let _refreshingRegion=false;
async function refreshRegion(region){
  if(_refreshingRegion) return;
  const t=T();
  const farms = activeLocs().filter(l=>(l.region||t.ungrouped)===region);
  if(!farms.length) return;
  _refreshingRegion=true;
  // find the header button for this region to show progress
  let btn=null;
  for(const b of document.querySelectorAll(".lg-refresh")){
    const nm=b.parentElement && b.parentElement.querySelector(".lg-name");
    if(nm && nm.textContent===region){ btn=b; break; }
  }
  if(btn){ btn.classList.add("spinning"); }
  let done=0, failed=0;
  const setProg=()=>{ if(btn) btn.textContent=`${done}/${farms.length}`; };
  setProg();
  for(const loc of farms){
    try{ await syncLocation(loc, range, null, false); }
    catch(e){ failed++; }
    done++; setProg();
  }
  _refreshingRegion=false;
  // if the active farm was in this region, refresh its scorecard
  if(farms.some(l=>l.id===activeLoc)){
    const sc=scoreLocation(activeLoc, range);
    setSyncStatus({synced:sc.cmpN});
    renderVerdict(); renderCharts(); renderTable();
  }
  renderLocList();
  toast(failed ? t.regionDonePartial(done-failed, farms.length) : t.regionDone(farms.length));
}

/* lightweight toast */
let _toastT=null;
function toast(msg){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; el.className="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add("on");
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove("on"),2600);
}
function useGps(){
  if(!navigator.geolocation){ setSyncStatus("gpsErr"); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    $("#inLat").value=p.coords.latitude.toFixed(4);
    $("#inLon").value=p.coords.longitude.toFixed(4);
    setSyncStatus("gpsOk");
  },()=>{ setSyncStatus("gpsErr"); });
}

/* ---------- wire up ---------- */
$("#langBtn").addEventListener("click",()=>{
  LANG = LANG==="zh"?"en":"zh"; localStorage.setItem("rainscore_lang",LANG); renderAll();
});
$("#btnAdd").addEventListener("click",saveLoc);
$("#btnOpenAdd").addEventListener("click",toggleForm);
$("#btnHelp").addEventListener("click",openGuide);
$("#btnModels").addEventListener("click",openModelPicker);
$("#btnCloseForm").addEventListener("click",closeForm);
$("#btnCancelEdit").addEventListener("click",closeForm);
$("#btnGps").addEventListener("click",useGps);
$("#btnSync").addEventListener("click",()=>doSync(true));
$("#btnExport").addEventListener("click",exportCSV);
$("#locFilter").addEventListener("input",renderLocList);
$("#rangeSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  range=+b.dataset.r;
  [...$("#rangeSeg").children].forEach(x=>x.classList.toggle("on",x===b));
  renderVerdict(); renderCharts(); renderTable();
});

/* ---------- boot: render, then log-on-open auto-sync of active location ---------- */
renderAll();
if(activeLoc) doSync();   // log-on-open + gap-fill happens here every launch

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
